# Configuraçőes específicas para o ambiente de produçăo
# Configuirar variaveis de ambiente para JWT_SECRET_KEY e outras variáveis sensíveis

spring.application.name=trads-corretora
spring.profiles.active=prod

spring.datasource.url=jdbc:sqlite:saida/crm_trads_prod.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.ssl.key-store=# Configuraçőes de segurança para produçăo


jwt.secret=${JWT_SECRET_KEY}