<app-header></app-header>

<div class="p-6 bg-slate-50 min-h-screen">
  <div class="flex flex-col md:flex-row justify-evenly items-start md:items-center mb-6 gap-4">
    <h1 class="text-2xl font-bold text-slate-800">Dashboard de Desempenho</h1>

    <div
      class="flex items-center gap-2 bg-white p-2 text-wrap rounded-lg shadow-sm border border-slate-100 hidden md:flex">
      @if (role === 'ADMIN') {
      <div class="flex flex-col">
        <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold">Corretor</span>
        <select
          class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none focus:border-indigo-500 min-w-[200px]"
          (change)="onUserChange($event)">
          <option value="">Todos os Corretores</option>
          @for (user of users(); track user.id) {
          <option [value]="user.id">{{ user.name }}</option>
          }
        </select>
      </div>
      }

      <div class="h-10 w-px bg-slate-200 mx-2"></div>

      <div class="flex flex-col">
        <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold">Data Inicial</span>
        <input type="date" #startDateInput
          class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none focus:border-indigo-500">
      </div>
      <div class="flex flex-col">
        <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold">Data Final</span>
        <input type="date" #endDateInput
          class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none focus:border-indigo-500">
      </div>
      <div class="flex items-end self-end gap-1 mb-[1px]">
        <button (click)="applyDateFilter(startDateInput.value, endDateInput.value)"
          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm transition-all text-sm font-medium cursor-pointer">Filtrar</button>
        <button (click)="applyDateFilter('', ''); startDateInput.value=''; endDateInput.value=''"
          class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded shadow-sm transition-all text-sm font-medium cursor-pointer">Limpar</button>
      </div>
    </div>

    @if (role === 'ADMIN') {
    <button
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-sm transition-all flex items-center gap-2 cursor-pointer mt-2 md:mt-0">
      <span class="material-symbols-outlined h-6 w-6">
        add
      </span>
      Criar Novo Gráfico
    </button>
    }
  </div>

  <div
    class="flex flex-col gap-3 bg-white p-3 text-wrap rounded-lg shadow-sm border border-slate-100 flex md:hidden mb-6 w-full">
    <div class="flex flex-col">
      <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold">Corretor</span>
      <select
        class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none focus:border-indigo-500 w-full"
        (change)="onUserChange($event)">
        <option value="">Todos os Corretores</option>
        @for (user of users(); track user.id) {
        <option [value]="user.id">{{ user.name }}</option>
        }
      </select>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <div class="w-full sm:w-auto flex-1">
        <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold block">Data Inicial</span>
        <input type="date" #mobStartDateInput
          class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none w-full">
      </div>
      <div class="w-full sm:w-auto flex-1">
        <span class="text-xs text-slate-500 mb-1 ml-1 font-semibold block">Data Final</span>
        <input type="date" #mobEndDateInput
          class="border border-slate-200 rounded p-1.5 text-sm text-slate-700 outline-none w-full">
      </div>
    </div>
    <div class="flex gap-2 w-full mt-1">
      <button (click)="applyDateFilter(mobStartDateInput.value, mobEndDateInput.value)"
        class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-sm flex-1 font-medium">Filtrar</button>
      <button (click)="applyDateFilter('', ''); mobStartDateInput.value=''; mobEndDateInput.value=''"
        class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded text-sm flex-1 font-medium">Limpar
        datas</button>
    </div>
  </div>
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 w-full">

    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-slate-700">Funil de transições</h2>
        <div class="flex gap-1">
          <button (click)="transitionsFilter.set('ALL')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="transitionsFilter() !== 'ALL'">Todos</button>
          <button (click)="transitionsFilter.set('P0')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="transitionsFilter() !== 'P0'">P0</button>
          <button (click)="transitionsFilter.set('P10')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="transitionsFilter() !== 'P10'">P10</button>
          <button (click)="transitionsFilter.set('P20')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="transitionsFilter() !== 'P20'">P20</button>
        </div>
      </div>
      <div class="h-80 md:h-[350px] w-full">
        <app-dashboard-graphics [chartType]="'bar'" [data]="transitionsChartData()" xAxisLabel="Transições"
          yAxisLabel="Quantidade">
        </app-dashboard-graphics>
      </div>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-slate-700">Média de Dias nas Etapas do Funil</h2>
        <div class="flex gap-1">
          <button (click)="stagesFilter.set('ALL')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="stagesFilter() !== 'ALL'">Todos</button>
          <button (click)="stagesFilter.set('P0')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="stagesFilter() !== 'P0'">P0</button>
          <button (click)="stagesFilter.set('P10')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="stagesFilter() !== 'P10'">P10</button>
          <button (click)="stagesFilter.set('P20')"
            class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-medium transition-opacity"
            [class.opacity-50]="stagesFilter() !== 'P20'">P20</button>
        </div>
      </div>
      <div class="h-80 md:h-[350px] w-full">
        <app-dashboard-graphics [chartType]="'bar'" [data]="lineChartData()" xAxisLabel="Etapa" yAxisLabel="Dias">
        </app-dashboard-graphics>
      </div>
    </div>


    <div class="flex flex-col gap-4">
      <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col">
        <h2 class="text-lg font-semibold text-slate-700 mb-4">Ganhos no tempo</h2>
        <div class="h-80 md:h-[350px] w-full">
          <app-dashboard-graphics [chartType]="'line'" [data]="pieChartData()" [showLegend]="true">
          </app-dashboard-graphics>
        </div>

      </div>
      <div class="flex justify-center gap-2">
        <button (click)="filterType.set('day')"
          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm transition-all text-sm font-medium cursor-pointer">Dia</button>
        <button (click)="filterType.set('week')"
          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm transition-all text-sm font-medium cursor-pointer">Semana</button>
        <button (click)="filterType.set('month')"
          class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm transition-all text-sm font-medium cursor-pointer">Mês</button>
      </div>

    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col">
      <h2 class="text-lg font-semibold text-slate-700 mb-4">Perdas e Conversão</h2>
      <div class="h-80 md:h-[350px] w-full">
        <app-dashboard-graphics [chartType]="'bar'" [data]="lossConversionChartData()" xAxisLabel="Etapa de Origem"
          yAxisLabel="Qtd. Perdas">
        </app-dashboard-graphics>
      </div>
    </div>


  </div>
</div>
