<header class="bg-indigo-600 text-white shadow-md">
  <div class="px-6 py-4 flex items-center justify-between">
    <div class="flex items-center space-x-2">
      <span class="text-xl font-bold tracking-wide">Trads Corretora</span>
    </div>

    <div class="flex items-center space-x-6">
      <div class="flex flex-col text-right">
        <span class="text-sm font-semibold">{{ userEmail || 'Usuário' }}</span>
        <span
          class="text-xs text-indigo-200 capitalize font-medium px-2 py-0.5 bg-indigo-700 rounded-full inline-block mt-1 self-end">
          Role: {{ userRole || 'N/A' }}
        </span>
      </div>
      <button (click)="logout()"
        class="p-2 bg-indigo-700 hover:bg-indigo-800 rounded-full transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-indigo-300"
        title="Sair da conta">
        <span class="material-symbols-outlined w-6 h-6 text-white !text-[24px] cursor-pointer">
          logout
        </span>
      </button>
    </div>
  </div>
</header>
